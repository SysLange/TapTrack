<!doctype html>
<html>
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.svg" />
    <title>TapTrack</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="/order.js"></script>
  </head>
  <body>
    <div class="relative flex h-dvh w-screen flex-col bg-neutral-200">

      <div class="m-2.5 flex flex-col items-center justify-center gap-2.5 rounded-xl bg-green-300 p-2.5 shadow-sm inset-shadow-sm">
        <span id="price" class="font-sans text-5xl font-bold text-shadow-lg">0,00 €</span>

      <button onclick="window.location.replace('/')" class="rounded-full bg-green-500 px-15 py-5 font-sans text-2xl font-bold text-white">FERTIG</button>
