<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.svg">
    <title>TapTrack</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="/taptrack.js"></script>
  </head>
  <body>
    <div class="flex h-dvh w-screen flex-col">
      <!-- buttons -->
      <div class="flex w-full items-center justify-between bg-blue-300 px-5 pt-5">
        <button class="aspect-square w-10 rounded-xl bg-red-500 bg-[url(https://i.imgur.com/nWIn6C3.png)] bg-cover bg-center"></button>
        <button class="aspect-square w-10 rounded-xl bg-green-500 bg-[url(https://i.imgur.com/fwPw7am.png)] bg-cover bg-center"></button>
      </div>

      <!-- price -->
      <div class="flex w-full flex-col items-center border-b-3 bg-blue-300 pb-5">
        <span class="font-sans text-5xl font-bold">0,00 €</span>
        <span class="font-sans text-xl">Wählen Sie einen Artikel</span>
      </div>

      <!-- items -->
      <div id="itemsContainer" class="grid w-full scrollbar-none grid-cols-2 gap-2.5 overflow-y-auto p-2.5">
        <!-- Bier -->
        <div class="relative flex aspect-square w-full flex-col items-center justify-between rounded-xl border-3 bg-neutral-400 p-1">
          <div class="absolute top-1 right-1 flex h-10 w-10 items-center justify-center rounded-full border border-black bg-red-500">
            <span class="text-xl font-bold text-white">4</span>
          </div>
          <img width="1000" height="1000" class="aspect-square w-3/4 rounded-xl" src="https://i.imgur.com/A6TzDO3.png" />
          <span class="font-sans text-xl">Bier 0,5L</span>
        </div>
        <div class="relative flex aspect-square w-full flex-col items-center justify-between rounded-xl border-3 bg-neutral-400 p-1">
          <div class="absolute top-1 right-1 flex h-10 w-10 items-center justify-center rounded-full border border-black bg-red-500">
            <span class="text-xl font-bold text-white">5</span>
          </div>
          <img width="1000" height="1000" class="aspect-square w-3/4 rounded-xl" src="https://i.imgur.com/A6TzDO3.png" />
          <span class="font-sans text-xl">Bier 1L</span>
        </div>

        <!-- Fanta -->
        <div class="relative flex aspect-square w-full flex-col items-center justify-between rounded-xl border-3 bg-neutral-400 p-1">
          <div class="absolute top-1 right-1 flex hidden h-10 w-10 items-center justify-center rounded-full border border-black bg-red-500">
            <span class="text-xl font-bold text-white">2</span>
          </div>
          <img width="1000" height="1000" class="aspect-square w-3/4 rounded-xl" src="https://i.imgur.com/Drm80tp.png" />
          <span class="font-sans text-xl">Fanta 0,5L</span>
        </div>
      </div>
    </div>
  </body>
</html>
