<!doctype html>
<html lang="de">
    <head>
        <base href="TapTrack" />

        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        
        <title>TapTrack</title> 

        <link rel="stylesheet" href="src/style.css">
        <script src="index.js"></script>

        <link rel="icon" type="image/x-icon" href="src/favicon.svg" />
    </head>
    <body>
        <div class="flex h-dvh w-screen flex-col items-center justify-evenly bg-neutral-300">
            <!-- logo -->
            <div class="flex h-1/3 flex-col items-center justify-center">
                <img class="h-40 w-40" src="src/favicon.svg" />
                <span class="font-sans text-4xl font-bold text-shadow-lg">TapTrack</span>
            </div>

            <!-- code form -->
            <div class="flex flex-col items-center justify-center gap-5 rounded-xl bg-neutral-50 p-5 shadow-sm inset-shadow-sm">
                <span class="font-sans text-xl text-shadow-lg">Bitte Code Eingeben:</span>
                <input id="input_code" type="text" class="h-10 rounded-xl bg-neutral-300 px-2.5 font-mono text-xl shadow-sm inset-shadow-sm text-shadow-lg" maxlength="20" />
                <span id="error" class="hidden rounded-full bg-red-300 px-5 py-2.5 shadow-sm inset-shadow-sm text-shadow-lg">Code Ungültig</span>
                <button onclick="submitCode()" class="flex h-10 items-center justify-center rounded-xl bg-green-700 px-10 py-5 shadow-sm inset-shadow-sm">
                    <span class="font-sans text-xl text-white text-shadow-lg">OK</span>
                </button>
            </div>

            <!-- placeholder -->
            <div class="h-1/3"></div>
        </div>
    </body>
</html>
