<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TapTrack</title> 

    <base href="https://syslange.github.io/TapTrack/" />
    <link rel="icon" type="image/x-icon" href="favicon.svg" />
    <link rel="stylesheet" href="style.css" />
    <script src="scripts/taptrack.js"></script>
  </head>
  <body>
    <div class="flex h-dvh w-screen flex-col bg-neutral-200">
      <!-- overview -->
      <div class="relative m-2.5 mb-3.5 flex flex-col gap-2.5 rounded-xl bg-neutral-50 p-2.5 pb-7.5 shadow-sm inset-shadow-sm">
        <!-- Cancel Order -->
        <div>
          <button onclick="resetOrder()" class="flex flex-row items-center gap-1">
            <img width="20" height="20" class="aspect-square h-full" src="icons/close.png" />
            <span class="font-sans text-base">Abbrechen</span>
          </button>
        </div>

        <!-- Price -->
        <div class="flex items-center justify-center">
          <span id="price" class="font-sans text-5xl font-bold text-shadow-lg">0,00 €</span>
        </div>

        <!-- Confirm -->
        <div class="absolute right-0 -bottom-3.5 left-0 flex items-center justify-center">
          <button onclick="confirmOrder()" class="rounded-full bg-green-400 p-1 px-5 font-sans text-base font-bold text-white">BESTÄTIGUNG</button>
        </div>
      </div>

      <!-- items -->
      <div id="itemsContainer" class="grid w-full scrollbar-none grid-cols-2 gap-2.5 overflow-y-auto p-2.5"></div>
    </div>
  </body>
</html>
