<!doctype html>
<html lang="de">
    <head>
        <base href="order" />

        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        
        <title>TapTrack</title> 

        <link rel="stylesheet" href="../src/style.css">
        <script src="index.js"></script>

        <link rel="icon" type="image/x-icon" href="../src/favicon.svg" />
    </head>
    <body>
        <div class="flex h-dvh w-screen flex-col bg-neutral-300">
            <!-- overview -->
            <div class="flex justify-around">
                <button onclick="resetOrder()" class="my-2.5 rounded-full bg-red-500 p-4 shadow-sm inset-shadow-sm">
                    <img class="h-10 w-10" src="../src/icons/close.png"/>
                </button>
                <div class="my-2.5 flex items-center justify-center">
                    <span id="price" class="rounded-xl bg-neutral-50 p-2.5 font-sans text-5xl font-bold shadow-sm inset-shadow-sm text-shadow-lg">0,00 €</span>
                </div>
                <button onclick="submitOrder()" class="my-2.5 rounded-full bg-green-500 p-4 shadow-sm inset-shadow-sm">
                    <img class="h-10 w-10" src="../src/icons/check.png"/>
                </button>
            </div>

            <!-- content -->
            <div class="h-full w-full">
                <!-- items -->
                <div id="itemsContainer" class="mx-2 grid grid-cols-2 gap-2">
                </div>

                <!-- log out -->
                <div class="flex justify-center">
                    <button class="my-5 rounded-full bg-black px-5 py-2.5 shadow-sm inset-shadow-sm">
                        <span onclick="logout()" class="font-sans text-lg text-white text-shadow-lg">Ausloggen</span>
                    </button>
                </div>
            </div>
        </div>
    </body>
</html>
