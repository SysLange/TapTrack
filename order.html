<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TapTrack</title>
    
    <base href="https://syslange.github.io/TapTrack/" />
    <link rel="icon" type="image/x-icon" href="favicon.svg" />
    <link rel="stylesheet" href="style.css" />
    <script src="scripts/order.js"></script>
  </head>
  <body>
    <div class="flex h-dvh w-screen flex-col bg-neutral-300">
      <!-- order price -->
      <div class="my-2.5 flex items-center justify-center">
        <span id="price" class="rounded-xl bg-neutral-50 p-2.5 font-sans text-5xl font-bold shadow-sm inset-shadow-sm text-shadow-lg">0,00 €</span>
      </div>

      <!-- order list -->
      <div id="orderContainer" class="mx-5 flex-grow scrollbar-thin overflow-y-auto rounded-xl bg-neutral-50 p-2.5 shadow-sm inset-shadow-sm">

      </div>

      <!-- done button -->
      <div class="my-2.5 flex items-center justify-center">
        <button onclick="window.location.replace('/TapTrack/')" class="rounded-xl bg-green-500 px-10 py-5 font-sans text-2xl font-bold text-white shadow-sm inset-shadow-sm text-shadow-lg">FERTIG</button>
      </div>
    </div>
  </body>
</html>
